name: Daily Blog Post

on:
    schedule:
        - cron: "0 0 * * *"
    push:
        branches:
            - main

jobs:
    build-and-deploy:
        runs-on: ubuntu-latest
        permissions:
            contents: write
        env:
            FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        steps:
            - uses: actions/checkout@v4
              with:
                  token: ${{ secrets.GITHUB_TOKEN }}
            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.x"
            - name: Install dependencies
              run: python3 -m pip install --upgrade pip
            - name: Generate post
              run: python3 scripts/generate_post.py
            - name: Commit post
              run: |
                  git config --local user.name "Auto Blog Bot"
                  git config --local user.email "noreply@example.com"
                  git add content/posts/*.md
                  git commit -m "chore: auto-publish daily post" || echo "No changes to commit"
            - name: Push changes
              run: |
                  git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/osgupta/auto-blog-vercel.git
                  git push origin main
              if: success()
            - name: Send email (dynamic template)
              run: |
                  if [ -n "${{ secrets.SENDGRID_API_KEY }}" ]; then
                      python3 -m pip install sendgrid
                      python3 scripts/send_email_dynamic.py
                  else
                      echo "SendGrid API key not configured, skipping email notification"
                  fi
              env:
                  SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
                  SENDGRID_FROM_EMAIL: ${{ secrets.SENDGRID_FROM_EMAIL }}
                  EMAIL_TO: ${{ secrets.EMAIL_TO }}
                  SENDGRID_TEMPLATE_ID: ${{ secrets.SENDGRID_TEMPLATE_ID }}
